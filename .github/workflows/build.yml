name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Check project structure
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo ""
        echo "=== App Directory ==="
        ls -la app/
        echo ""
        echo "=== Gradle Wrapper ==="
        ls -la gradlew || echo "gradlew not found"
        cat gradle/wrapper/gradle-wrapper.properties
        
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      continue-on-error: true
      
    - name: Check build outputs
      run: |
        echo "=== Build Directory ==="
        ls -la app/build/ 2>/dev/null || echo "build directory not found"
        echo ""
        echo "=== Outputs Directory ==="
        ls -la app/build/outputs/ 2>/dev/null || echo "outputs directory not found"
        echo ""
        echo "=== APK Directory ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "apk directory not found"
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
