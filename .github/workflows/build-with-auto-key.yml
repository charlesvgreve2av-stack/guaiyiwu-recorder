name: Build APK with Auto Key

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # 自动生成测试签名密钥
    - name: Generate test keystore
      run: |
        keytool -genkey -v \
          -keystore release.keystore \
          -alias guaiyiwu \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass guaiyiwu123 \
          -keypass guaiyiwu123 \
          -dname "CN=Test, OU=Test, O=Test, L=Test, ST=Test, C=CN"
        echo "测试密钥已生成"
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Build Signed Release APK
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=../release.keystore \
          -Pandroid.injected.signing.store.password=guaiyiwu123 \
          -Pandroid.injected.signing.key.alias=guaiyiwu \
          -Pandroid.injected.signing.key.password=guaiyiwu123
      
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: app/build/outputs/apk/release/app-release.apk
